name: release

# Tag push vX.Y.Z => compile gate, auto-draft changelog from conventional commits,
# publish the GitHub release. The exactness battery already ran on the rig before
# the tag (docs/RELEASING.md) — CI here is the build check + the paperwork.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # changelog needs tag history

      - name: Install CUDA 13.1 (nvcc + headers)
        run: |
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update -q
          sudo apt-get install -y -q cuda-nvcc-13-1 cuda-cudart-dev-13-1 libcublas-dev-13-1

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --bins
        env:
          BW24_NVCC: /usr/local/cuda-13.1/bin/nvcc

      - name: Draft changelog
        run: bash tools/changelog.sh > /tmp/notes.md && cat /tmp/notes.md

      - name: Package binaries
        run: |
          pkg="bw24-$GITHUB_REF_NAME-linux-x86_64-sm120a"
          mkdir -p "/tmp/$pkg"
          cp target/release/{run-gen,run-spec,bw24-server,kernel-check} "/tmp/$pkg/"
          {
            echo "bw24 $GITHUB_REF_NAME — prebuilt Linux x86_64 binaries (sm_120a fatbin)"
            echo ""
            echo "Requirements: NVIDIA driver with CUDA 13.x runtime support, an sm_120"
            echo "(RTX 50-series) GPU, and the CUDA 13.1 runtime libraries (cudart, cublas)."
            echo "Built on ubuntu-24.04 (glibc 2.39) — older distros need a source build."
            echo ""
            echo "Quick start: ./kernel-check   # expect: ALL GREEN: kernels match CPU reference."
            echo "Docs: https://github.com/avifenesh/bw24"
          } > "/tmp/$pkg/README.txt"
          tar -C /tmp -czf "/tmp/$pkg.tar.gz" "$pkg"
          echo "PKG=/tmp/$pkg.tar.gz" >> "$GITHUB_ENV"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file /tmp/notes.md \
            --verify-tag \
            "$PKG"
